# Formatting
formatting:
  excerpt_sentences: 3          # Kolik vět z textu postu použít jako excerpt
  excerpt_max_chars: 400        # Max délka excerptua
  title_min_length: 30          # Min délka titulku (nížekrátit nelze)
  title_max_length: 120         # Max délka titulku před zkrácením
  title_safety_buffer: 30       # Safety buffer při výpočtu délky
  article_separator: "\n"       # Oddělovač mezi články
  sleep_between_toots: 1        # Sekund čekání mezi tootem a reply
